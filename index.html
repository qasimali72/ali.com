<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My 3D Portfolio</title>
  <style>
    body { margin: 0; background: #111; color: #fff; font-family: Arial, sans-serif; }
    canvas { display: block; }
    .overlay {
      position: absolute; top: 20px; left: 20px;
      background: rgba(0,0,0,0.6); padding: 20px; border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Your Name</h1>
    <p>About Me: Passionate developer...</p>
    <p>Skills: HTML, CSS, JS, Three.js</p>
    <p>Experience: ...</p>
    <p>Education: ...</p>
    <p>Contact: email@example.com</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Basic 3D scene
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 3D rotating cube with your picture as texture
    const geometry = new THREE.BoxGeometry();
    const texture = new THREE.TextureLoader().load('your-picture.jpg');
    const material = new THREE.MeshBasicMaterial({ map: texture });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    camera.position.z = 3;

    function animate() {
      requestAnimationFrame(animate);
      cube.rotation.x += 0.01;
      cube.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
